<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Kids Cards (Micro EVEs, Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { size: A4; margin: 10mm; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#0a1a2f;margin:0;padding:10mm;background:#f6f7fb}
  .screen-note{background:#fff7ed;border:1px solid #fed7aa;padding:.6rem;border-radius:.5rem;margin:0 0 8px}
  .toolbar{display:flex;gap:.5rem;align-items:center;margin:0 0 8px}
  .toolbar button{padding:.45rem .8rem;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer}

  /* 3×3 grid per sheet */
  .sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:8mm;page-break-after:always}
  .sheet:last-of-type{page-break-after:auto}

  /* Poker-size card in mm for true print size */
  .card{width:63mm;height:88mm;border-radius:4mm;background:#fff;box-shadow:0 0 0 0.5pt #e5e7eb inset;position:relative;overflow:hidden;break-inside:avoid}
  .pad{position:absolute;inset:6mm}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3mm}
  .title{font-size:12pt;font-weight:700}
  .species{font-size:10pt;color:#334155}
  .sub{font-size:9pt;color:#64748b}

  :root{
    --intact:#16a34a; --useful:#ef4444; --broken:#6b7280; --unique:#d4a017;
    --grid:#e5e7eb; --ink:#0a1a2f;
    --eve-size-mm: 1.2;     /* Front: tiny EVEs (diameter mm) */
    --eve-back-mm: 1.8;     /* Back: larger EVEs (diameter mm) */
    --stroke-mm: 0.20;      /* Back: stroke width mm for lines/X */
  }

  .legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:3mm}
  .chip{display:inline-flex;gap:4px;align-items:center;border:1px solid #e5e7eb;border-radius:999px;padding:2px 6px;font-size:8.5pt;background:#fff;color:#0f172a}
  .dot{width:9px;height:9px;border-radius:50%}

  /* Optional cut marks frame (purely visual, may not be exact to the mm) */
  .cutmarks{position:absolute;inset:0;pointer-events:none}
  .cutmarks svg{position:absolute;inset:-6mm;width:calc(100% + 12mm);height:calc(100% + 12mm)}
  .cutmarks line{stroke:#94a3b8;stroke-width:.2pt;opacity:.7}
</style>
</head>
<body>

<div class="screen-note">
  Kids (micro‑EVEs): Fronts have very small, fully opaque EVEs (best with 5–10× hand lenses). Backs show larger EVEs and a legend. Print A4 at 100% scale (no “fit to page”). Test one sheet first.
</div>
<div class="toolbar">
  <button onclick="window.print()">Print</button>
</div>

<!-- Page 1: Fronts -->
<section class="sheet" id="fronts"></section>

<!-- Page 2: Backs (answer key) -->
<section class="sheet" id="backs"></section>

<script>
/*
  EVE Detective — Kids (Micro EVEs)
  - One card per species (63×88 mm). EVEs positioned via normalized coords, rendered in mm.
  - Front: small EVEs (diameter ~1.2 mm) for use with magnifying lens.
  - Back: larger EVEs (diameter ~1.8 mm) + legend (no lens required).
*/

const speciesData = [
  { key:'melanogaster', short:'D. mel.', full:'Drosophila melanogaster',
    region:'piRNA cluster 3R‑TAS',
    intact:[[0.12,0.22],[0.52,0.15]],
    useful:[[0.35,0.45]],
    broken:[[0.18,0.65]],
    unique:[[0.76,0.42],[0.88,0.30]]
  },
  { key:'simulans', short:'D. sim.', full:'Drosophila simulans',
    region:'piRNA cluster 2L‑TAS',
    intact:[[0.22,0.20],[0.60,0.22]],
    useful:[[0.36,0.55]],
    broken:[[0.18,0.70]],
    unique:[[0.82,0.36]]
  },
  { key:'yakuba', short:'D. yak.', full:'Drosophila yakuba',
    region:'Heterochromatin island H3',
    intact:[[0.22,0.18]],
    useful:[[0.52,0.55]],
    broken:[[0.28,0.72]],
    unique:[[0.78,0.20]]
  },
  { key:'virilis', short:'D. vir.', full:'Drosophila virilis',
    region:'piRNA cluster 3L‑TAS',
    intact:[[0.20,0.28],[0.62,0.18]],
    useful:[[0.48,0.50]],
    broken:[[0.26,0.74]],
    unique:[[0.82,0.22]]
  },
  { key:'pseudoananassae', short:'D. pse.', full:'Drosophila pseudoananassae',
    region:'Subtelomeric repeat S1',
    intact:[[0.18,0.20],[0.46,0.18]],
    useful:[[0.66,0.55]],
    broken:[[0.28,0.72]],
    unique:[[0.70,0.18]]
  }
];

function svgFront(data){
  // Card SVG in mm: 63×88; pad content by 4mm all round
  const W=63, H=88, PAD=4;
  const dots = [];
  const dmm = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--eve-size-mm')) || 1.2;
  const r = dmm/2;

  function place(list, color, kind){
    (list||[]).forEach(([nx,ny])=>{
      const x = PAD + nx*(W-2*PAD);
      const y = PAD + ny*(H-2*PAD);
      if (kind==='circle'){
        dots.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${color}"/>`);
      } else if (kind==='diamond'){
        const s = dmm;
        const x0 = (x - s/2).toFixed(2), y0 = (y - s/2).toFixed(2);
        dots.push(`<rect x="${x0}" y="${y0}" width="${s}" height="${s}" fill="${color}" transform="rotate(45 ${x.toFixed(2)} ${y.toFixed(2)})" rx="${(s*0.1).toFixed(2)}"/>`);
      } else if (kind==='cross'){
        const len = dmm*1.2, sw = dmm*0.18;
        dots.push(`<g stroke="${color}" stroke-width="${sw}">
          <line x1="${(x-len/2).toFixed(2)}" y1="${(y-len/2).toFixed(2)}" x2="${(x+len/2).toFixed(2)}" y2="${(y+len/2).toFixed(2)}"/>
          <line x1="${(x-len/2).toFixed(2)}" y1="${(y+len/2).toFixed(2)}" x2="${(x+len/2).toFixed(2)}" y2="${(y-len/2).toFixed(2)}"/>
        </g>`);
      } else if (kind==='star'){
        const R = dmm*0.9, r2 = R*0.4;
        const pts=[];
        for(let i=0;i<10;i++){
          const ang = -Math.PI/2 + i*(Math.PI/5);
          const rad = (i%2===0)? R : r2;
          pts.push([ (x+rad*Math.cos(ang)).toFixed(2), (y+rad*Math.sin(ang)).toFixed(2) ]);
        }
        dots.push(`<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${color}"/>`);
      }
    });
  }

  // soft grid
  const grid = [];
  for(let gx=0; gx<=W; gx+=3){ grid.push(`<line x1="${gx}" y1="0" x2="${gx}" y2="${H}" stroke="#eef2f7" stroke-width="0.15"/>`); }
  for(let gy=0; gy<=H; gy+=3){ grid.push(`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="#eef2f7" stroke-width="0.15"/>`); }

  place(data.intact, 'var(--intact)', 'circle');
  place(data.useful, 'var(--useful)', 'diamond');
  place(data.broken, 'var(--broken)', 'cross');
  place(data.unique, 'var(--unique)', 'star');

  return `
    <div class="card">
      <div class="pad">
        <div class="hdr">
          <div class="title">Find the EVEs</div>
          <div class="species">${data.short}</div>
        </div>
        <div class="sub">${data.full} — ${data.region}</div>
        <svg width="63mm" height="88mm" viewBox="0 0 ${W} ${H}">
          ${grid.join('')}
          ${dots.join('')}
        </svg>
      </div>
      <div class="cutmarks" aria-hidden="true">
        <svg>
          <line x1="6mm" y1="0" x2="6mm" y2="4mm" />
          <line x1="0" y1="6mm" x2="4mm" y2="6mm" />
          <line x1="calc(100% - 6mm)" y1="0" x2="calc(100% - 6mm)" y2="4mm" />
          <line x1="calc(100% - 0)" y1="6mm" x2="calc(100% - 4mm)" y2="6mm" />
          <line x1="6mm" y1="calc(100% - 0)" x2="6mm" y2="calc(100% - 4mm)" />
          <line x1="0" y1="calc(100% - 6mm)" x2="4mm" y2="calc(100% - 6mm)" />
          <line x1="calc(100% - 6mm)" y1="calc(100% - 0)" x2="calc(100% - 6mm)" y2="calc(100% - 4mm)" />
          <line x1="calc(100% - 0)" y1="calc(100% - 6mm)" x2="calc(100% - 4mm)" y2="calc(100% - 6mm)" />
        </svg>
      </div>
    </div>`;
}

function svgBack(data){
  const W=63, H=88, PAD=4;
  const dots = [];
  const dmm = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--eve-back-mm')) || 1.8;
  const r = dmm/2;
  const sw = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--stroke-mm')) || 0.20;

  function place(list, color, kind){
    (list||[]).forEach(([nx,ny])=>{
      const x = PAD + nx*(W-2*PAD);
      const y = PAD + ny*(H-2*PAD);
      if (kind==='circle'){
        dots.push(`<circle cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${color}"/>`);
      } else if (kind==='diamond'){
        const s = dmm;
        const x0 = (x - s/2).toFixed(2), y0 = (y - s/2).toFixed(2);
        dots.push(`<rect x="${x0}" y="${y0}" width="${s}" height="${s}" fill="${color}" transform="rotate(45 ${x.toFixed(2)} ${y.toFixed(2)})" rx="${(s*0.1).toFixed(2)}"/>`);
      } else if (kind==='cross'){
        const len = dmm*1.3;
        dots.push(`<g stroke="${color}" stroke-width="${sw}">
          <line x1="${(x-len/2).toFixed(2)}" y1="${(y-len/2).toFixed(2)}" x2="${(x+len/2).toFixed(2)}" y2="${(y+len/2).toFixed(2)}"/>
          <line x1="${(x-len/2).toFixed(2)}" y1="${(y+len/2).toFixed(2)}" x2="${(x+len/2).toFixed(2)}" y2="${(y-len/2).toFixed(2)}"/>
        </g>`);
      } else if (kind==='star'){
        const R = dmm*1.0, r2 = R*0.42;
        const pts=[];
        for(let i=0;i<10;i++){
          const ang = -Math.PI/2 + i*(Math.PI/5);
          const rad = (i%2===0)? R : r2;
          pts.push([ (x+rad*Math.cos(ang)).toFixed(2), (y+rad*Math.sin(ang)).toFixed(2) ]);
        }
        dots.push(`<polygon points="${pts.map(p=>p.join(',')).join(' ')}" fill="${color}"/>`);
      }
    });
  }

  // subtle grid
  const grid = [];
  for(let gx=0; gx<=W; gx+=3){ grid.push(`<line x1="${gx}" y1="0" x2="${gx}" y2="${H}" stroke="#e8edf3" stroke-width="0.15"/>`); }
  for(let gy=0; gy<=H; gy+=3){ grid.push(`<line x1="0" y1="${gy}" x2="${W}" y2="${gy}" stroke="#e8edf3" stroke-width="0.15"/>`); }

  place(data.intact, 'var(--intact)', 'circle');
  place(data.useful, 'var(--useful)', 'diamond');
  place(data.broken, 'var(--broken)', 'cross');
  place(data.unique, 'var(--unique)', 'star');

  return `
    <div class="card">
      <div class="pad">
        <div class="hdr">
          <div class="title">Answer Key</div>
          <div class="species">${data.short}</div>
        </div>
        <div class="sub">${data.full} — ${data.region}</div>
        <svg width="63mm" height="88mm" viewBox="0 0 ${W} ${H}">
          ${grid.join('')}
          ${dots.join('')}
        </svg>
        <div class="legend">
          <span class="chip"><span class="dot" style="background:var(--intact)"></span> Intact</span>
          <span class="chip"><span class="dot" style="background:var(--useful)"></span> Useful</span>
          <span class="chip"><span class="dot" style="background:var(--broken)"></span> Broken</span>
          <span class="chip"><span class="dot" style="background:var(--unique)"></span> Unique</span>
        </div>
      </div>
      <div class="cutmarks" aria-hidden="true">
        <svg>
          <line x1="6mm" y1="0" x2="6mm" y2="4mm" />
          <line x1="0" y1="6mm" x2="4mm" y2="6mm" />
          <line x1="calc(100% - 6mm)" y1="0" x2="calc(100% - 6mm)" y2="4mm" />
          <line x1="calc(100% - 0)" y1="6mm" x2="calc(100% - 4mm)" y2="6mm" />
          <line x1="6mm" y1="calc(100% - 0)" x2="6mm" y2="calc(100% - 4mm)" />
          <line x1="0" y1="calc(100% - 6mm)" x2="4mm" y2="calc(100% - 6mm)" />
          <line x1="calc(100% - 6mm)" y1="calc(100% - 0)" x2="calc(100% - 6mm)" y2="calc(100% - 4mm)" />
          <line x1="calc(100% - 0)" y1="calc(100% - 6mm)" x2="calc(100% - 4mm)" y2="calc(100% - 6mm)" />
        </svg>
      </div>
    </div>`;
}

// Render both pages
document.getElementById('fronts').innerHTML = speciesData.map(svgFront).join('');
document.getElementById('backs').innerHTML  = speciesData.map(svgBack).join('');
</script>
</body>
</html>
