<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Teens Cards (Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { 
    size: A4; 
    margin: 12mm;
  }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{
    font-family: Inter, system-ui, sans-serif;
    background: #e2e8f0;
    padding: 0;
    margin: 0;
  }

  .screen-note{
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 12px;
  }
  
  .toolbar{
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px;
    background: white;
    border-radius: 60px;
  }
  
  .toolbar button{
    background: #0e8a68;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
  }

  /* 3-column card grid */
  .sheet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10mm;
    page-break-after: always;
    margin-bottom: 10mm;
  }
  
  .sheet:last-of-type {
    page-break-after: auto;
  }

  /* Single full-width page for tree mat */
  .mat-page {
    page-break-after: auto;
  }
  
  .tree-mat {
    background: #faf9f6;
    border-radius: 20px;
    padding: 20px;
    border: 1px solid #e2e8f0;
    min-height: 280px;
  }

  /* Card styling - exactly 63x88mm poker size */
  .card {
    width: 63mm;
    height: 88mm;
    border-radius: 8mm;
    background: white;
    box-shadow: 0 0 0 1px #cbd5e1 inset;
    position: relative;
    overflow: hidden;
    break-inside: avoid;
  }
  
  .card-inner {
    padding: 6mm;
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
  }
  
  .card-title {
    font-size: 10pt;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  
  .card-species {
    font-size: 9pt;
    font-weight: 600;
    text-align: center;
    color: #0e8a68;
    margin-bottom: 8px;
  }
  
  .card-sub {
    font-size: 7pt;
    text-align: center;
    color: #64748b;
    margin-bottom: 8px;
  }

  /* Barcode with 8 positions */
  .barcode-container {
    background: #f8fafc;
    border-radius: 8px;
    padding: 8px 4px;
    margin: 8px 0;
  }
  
  .barcode {
    display: flex;
    gap: 3px;
    justify-content: center;
  }
  
  .band {
    width: 8px;
    height: 30px;
    border-radius: 2px;
  }
  
  .band.intact { background: #16a34a; }
  .band.useful { background: #ef4444; }
  .band.broken { background: #111827; }
  .band.unique { background: #f59e0b; }
  .band.empty { background: #e2e8f0; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    margin-top: auto;
  }
  
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 7pt;
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 20px;
  }
  
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Tree Mat styling */
  .tree-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  .tree-tip {
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 10px;
  }
  
  .tree-svg-container {
    text-align: center;
    margin: 16px 0;
  }
  
  .tree-slot {
    background: #f8fafc;
    border: 2px dashed #94a3b8;
    border-radius: 12px;
    padding: 9px;
    text-align: center;
  }
  
  .slot-label {
    font-size: 9px;
    font-weight: 700;
    color: #0e8a68;
  }
  
  .slot-hint {
    font-size: 8px;
    color: #64748b;
  }
  
  hr {
    margin: 16px 0;
    border: none;
    border-top: 1px solid #e2e8f0;
  }
</style>
</head>
<body>

<div class="screen-note">
  🧬 TEENS PACK: Page 1 = Species Cards (Front), Page 2 = Answer Key (Back), Page 3 = Phylogenetic Tree Mat. Print at 100% scale on A4 cardstock.
</div>

<div class="toolbar">
  <button onclick="window.print()">🖨️ Print Cards</button>
</div>

<!-- Page 1: Fronts (Species Cards) -->
<section class="sheet" id="fronts"></section>

<!-- Page 2: Backs (Answer Key) -->
<section class="sheet" id="backs"></section>

<!-- Page 3: Tree Mat (NO ANSWER KEY HERE) -->
<div class="mat-page">
  <div class="tree-mat">
    <div class="tree-title">🌳 Build the EVE Family Tree</div>
    
    <div class="tree-tip">
      💡 <strong>Tip:</strong> Compare the barcode cards. More matching coloured bars at the same positions = more shared EVEs = closer relatives.
    </div>
    
    <div class="tree-svg-container">
      <svg viewBox="0 0 700 380" width="100%" height="auto" style="background: #faf9f6; border-radius: 20px;">
        <!-- Tree branches -->
        <g stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round">
          <path d="M 50 190 C 100 190, 100 190, 150 190" />
          <path d="M 150 190 C 200 190, 200 90, 250 80" />
          <path d="M 150 190 C 200 190, 200 250, 250 250" />
          <path d="M 150 190 C 200 190, 200 340, 250 340" />
          <path d="M 250 80 C 300 80, 300 40, 350 40" />
          <path d="M 250 80 C 300 80, 300 120, 350 120" />
          <path d="M 250 250 C 300 250, 300 210, 350 210" />
          <path d="M 250 250 C 300 250, 300 290, 350 290" />
          <path d="M 250 340 C 300 340, 300 350, 350 350" />
        </g>
        
        <!-- Timescale labels -->
        <g font-family="Inter" font-size="9" fill="#f59e0b" font-weight="600">
          <text x="160" y="200">40-60 MYA</text>
          <text x="215" y="95">2-3 MYA</text>
          <text x="215" y="265">~25 MYA</text>
        </g>
        
        <!-- Slot boxes -->
        <foreignObject x="345" y="25" width="95" height="45">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
            <div class="slot-label">Pair A (closest)</div>
            <div class="slot-hint">(most shared EVEs)</div>
          </div>
        </foreignObject>
        
        <foreignObject x="345" y="105" width="95" height="45">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
            <div class="slot-hint">Place species card here</div>
          </div>
        </foreignObject>
        
        <foreignObject x="345" y="195" width="95" height="45">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
            <div class="slot-label">Pair B (next closest)</div>
            <div class="slot-hint">(fewer shared EVEs)</div>
          </div>
        </foreignObject>
        
        <foreignObject x="345" y="275" width="95" height="45">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
            <div class="slot-hint">Place species card here</div>
          </div>
        </foreignObject>
        
        <foreignObject x="345" y="335" width="95" height="45">
          <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
            <div class="slot-label">Outgroup (oldest)</div>
            <div class="slot-hint">(least shared EVEs)</div>
          </div>
        </foreignObject>
        
        <!-- Species labels (empty, for kids to place cards) -->
        <g font-family="Inter" font-size="10" fill="#cbd5e1" font-weight="600">
          <text x="315" y="45">?</text>
          <text x="315" y="125">?</text>
          <text x="315" y="215">?</text>
          <text x="315" y="295">?</text>
          <text x="315" y="365">?</text>
        </g>
        
        <!-- Root label -->
        <g font-family="Inter" font-size="9" fill="#4a5568">
          <text x="10" y="185">Common</text>
          <text x="10" y="197">Ancestor</text>
        </g>
      </svg>
    </div>
  </div>
</div>

<script>
// Species data with 8-position barcodes
const speciesData = [
  { 
    key: 'melanogaster', 
    short: 'D. mel.', 
    full: 'Drosophila melanogaster',
    bands: ['intact', 'useful', 'broken', 'useful', 'useful', 'broken', 'intact', 'empty']
  },
  { 
    key: 'simulans', 
    short: 'D. sim.', 
    full: 'Drosophila simulans',
    bands: ['intact', 'intact', 'broken', 'useful', 'unique', 'broken', 'intact', 'empty']
  },
  { 
    key: 'yakuba', 
    short: 'D. yak.', 
    full: 'Drosophila yakuba',
    bands: ['broken', 'useful', 'intact', 'broken', 'useful', 'broken', 'intact', 'empty']
  },
  { 
    key: 'pseudoobscura', 
    short: 'D. pse.', 
    full: 'Drosophila pseudoobscura',
    bands: ['useful', 'intact', 'intact', 'intact', 'useful', 'intact', 'intact', 'empty']
  },
  { 
    key: 'virilis', 
    short: 'D. vir.', 
    full: 'Drosophila virilis',
    bands: ['intact', 'broken', 'broken', 'broken', 'useful', 'broken', 'empty', 'empty']
  }
];

function bandClass(bandType) {
  if (bandType === 'intact') return 'intact';
  if (bandType === 'useful') return 'useful';
  if (bandType === 'broken') return 'broken';
  if (bandType === 'unique') return 'unique';
  return 'empty';
}

function barcodeHTML(bands) {
  return `
    <div class="barcode-container">
      <div class="barcode">
        ${bands.map(band => `<div class="band ${bandClass(band)}"></div>`).join('')}
      </div>
    </div>
  `;
}

function frontCard(sp) {
  return `
    <div class="card">
      <div class="card-inner">
        <div class="card-title">🔍 Compare Barcodes</div>
        <div class="card-species">${sp.full}</div>
        ${barcodeHTML(sp.bands)}
        <div class="legend">
          <span class="chip"><span class="dot" style="background:#16a34a;"></span> Intact</span>
          <span class="chip"><span class="dot" style="background:#ef4444;"></span> Useful</span>
          <span class="chip"><span class="dot" style="background:#111827;"></span> Broken</span>
          <span class="chip"><span class="dot" style="background:#f59e0b;"></span> Unique</span>
        </div>
      </div>
    </div>
  `;
}

function backCard(sp) {
  return `
    <div class="card">
      <div class="card-inner">
        <div class="card-title">📖 Answer Key</div>
        <div class="card-species">${sp.full}</div>
        ${barcodeHTML(sp.bands)}
        <div class="legend">
          <span class="chip"><span class="dot" style="background:#16a34a;"></span> Intact</span>
          <span class="chip"><span class="dot" style="background:#ef4444;"></span> Useful</span>
          <span class="chip"><span class="dot" style="background:#111827;"></span> Broken</span>
          <span class="chip"><span class="dot" style="background:#f59e0b;"></span> Unique</span>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('fronts').innerHTML = speciesData.map(sp => frontCard(sp)).join('');
document.getElementById('backs').innerHTML = speciesData.map(sp => backCard(sp)).join('');
</script>

</body>
</html>
