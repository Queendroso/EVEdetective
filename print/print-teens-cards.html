<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Teens Cards (Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { 
    size: A4; 
    margin: 10mm;
  }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{
    font-family: Inter, system-ui, sans-serif;
    background: #e2e8f0;
    padding: 0;
    margin: 0;
  }

  .screen-note{
    background: #eef2ff;
    border: 1px solid #c7d2fe;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 12px;
  }
  
  .toolbar{
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px;
    background: white;
    border-radius: 60px;
  }
  
  .toolbar button{
    background: #0e8a68;
    color: white;
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    cursor: pointer;
    font-weight: 600;
  }

  /* 3-column card grid - ONLY FRONT CARDS, NO ANSWER KEYS */
  .sheet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10mm;
    page-break-after: always;
    margin-bottom: 10mm;
  }
  
  .sheet:last-of-type {
    page-break-after: auto;
  }

  /* Card styling - exactly 63x88mm poker size */
  .card {
    width: 63mm;
    height: 88mm;
    border-radius: 8mm;
    background: white;
    box-shadow: 0 0 0 1px #cbd5e1 inset;
    position: relative;
    overflow: hidden;
    break-inside: avoid;
  }
  
  .card-inner {
    padding: 6mm;
    display: flex;
    flex-direction: column;
    height: 100%;
    box-sizing: border-box;
  }
  
  .card-title {
    font-size: 10pt;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  
  .card-species {
    font-size: 9pt;
    font-weight: 600;
    text-align: center;
    color: #0e8a68;
    margin-bottom: 8px;
  }

  /* Barcode with 8 positions */
  .barcode-container {
    background: #f8fafc;
    border-radius: 8px;
    padding: 8px 4px;
    margin: 8px 0;
  }
  
  .barcode {
    display: flex;
    gap: 3px;
    justify-content: center;
    flex-wrap: wrap;
  }
  
  .band {
    width: 8px;
    height: 30px;
    border-radius: 2px;
  }
  
  .band.intact { background: #16a34a; }
  .band.useful { background: #ef4444; }
  .band.broken { background: #111827; }
  .band.unique { background: #f59e0b; }
  .band.empty { background: #e2e8f0; }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    margin-top: auto;
  }
  
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 7pt;
    background: #f1f5f9;
    padding: 2px 6px;
    border-radius: 20px;
  }
  
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  /* Tree Mat styling - FIXED SLOT POSITIONS */
  .tree-mat {
    background: #faf9f6;
    border-radius: 20px;
    padding: 20px;
    border: 1px solid #e2e8f0;
    page-break-after: auto;
  }
  
  .tree-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  
  .tree-tip {
    background: #fef3c7;
    border-left: 4px solid #f59e0b;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 10px;
  }
  
  .tree-svg-container {
    text-align: center;
    margin: 16px 0;
  }
  
  .tree-slot {
    background: #f8fafc;
    border: 2px dashed #94a3b8;
    border-radius: 12px;
    padding: 8px;
    text-align: center;
  }
  
  .slot-label {
    font-size: 9px;
    font-weight: 700;
    color: #0e8a68;
  }
  
  .slot-hint {
    font-size: 8px;
    color: #64748b;
  }
</style>
</head>
<body>

<div class="screen-note">
  🧬 TEENS GAME: Page 1 = Species Cards, Page 2 = Phylogenetic Tree Mat. Print at 100% scale on A4 cardstock.
</div>

<div class="toolbar">
  <button onclick="window.print()">🖨️ Print Cards + Tree Mat</button>
</div>

<!-- Page 1: Species Cards (Fronts only - NO answer keys) -->
<section class="sheet" id="species-cards"></section>

<!-- Page 2: Tree Mat -->
<div class="tree-mat">
  <div class="tree-title">🌳 Build the EVE Family Tree</div>
  
  <div class="tree-tip">
    💡 <strong>Tip:</strong> Compare the barcode cards. More matching coloured bars at the same positions = more shared EVEs = closer relatives.
  </div>
  
  <div class="tree-svg-container">
    <svg viewBox="0 0 750 450" width="100%" height="auto" style="background: #faf9f6; border-radius: 20px;">
      <!-- Tree branches -->
      <g stroke="#60a5fa" stroke-width="2.5" fill="none" stroke-linecap="round">
        <!-- Main trunk -->
        <path d="M 50 220 C 100 220, 100 220, 150 220" />
        <!-- Branch to Pair A -->
        <path d="M 150 220 C 200 220, 200 100, 260 90" />
        <!-- Branch to Pair B -->
        <path d="M 150 220 C 200 220, 200 290, 260 280" />
        <!-- Branch to Outgroup -->
        <path d="M 150 220 C 200 220, 200 390, 260 380" />
        <!-- Sub-branches Pair A -->
        <path d="M 260 90 C 320 90, 320 40, 380 40" />
        <path d="M 260 90 C 320 90, 320 140, 380 140" />
        <!-- Sub-branches Pair B -->
        <path d="M 260 280 C 320 280, 320 230, 380 230" />
        <path d="M 260 280 C 320 280, 320 330, 380 330" />
        <!-- Outgroup branch -->
        <path d="M 260 380 C 320 380, 320 420, 380 420" />
      </g>
      
      <!-- Timescale labels -->
      <g font-family="Inter" font-size="9" fill="#f59e0b" font-weight="600">
        <text x="165" y="235">40-60 MYA</text>
        <text x="225" y="105">2-3 MYA</text>
        <text x="225" y="295">~25 MYA</text>
      </g>
      
      <!-- Slot 1 - Pair A top -->
      <foreignObject x="380" y="25" width="110" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
          <div class="slot-label">Pair A (closest)</div>
          <div class="slot-hint">Most shared EVEs</div>
        </div>
      </foreignObject>
      
      <!-- Slot 2 - Pair A bottom -->
      <foreignObject x="380" y="125" width="110" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
          <div class="slot-hint">Place card here</div>
        </div>
      </foreignObject>
      
      <!-- Slot 3 - Pair B top -->
      <foreignObject x="380" y="215" width="110" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
          <div class="slot-label">Pair B (next closest)</div>
          <div class="slot-hint">Fewer shared EVEs</div>
        </div>
      </foreignObject>
      
      <!-- Slot 4 - Pair B bottom -->
      <foreignObject x="380" y="315" width="110" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
          <div class="slot-hint">Place card here</div>
        </div>
      </foreignObject>
      
      <!-- Slot 5 - Outgroup -->
      <foreignObject x="380" y="405" width="110" height="50">
        <div xmlns="http://www.w3.org/1999/xhtml" class="tree-slot">
          <div class="slot-label">Outgroup (oldest)</div>
          <div class="slot-hint">Least shared EVEs</div>
        </div>
      </foreignObject>
      
      <!-- Empty question marks where cards go -->
      <g font-family="Inter" font-size="12" fill="#cbd5e1" font-weight="600">
        <text x="360" y="55">?</text>
        <text x="360" y="155">?</text>
        <text x="360" y="245">?</text>
        <text x="360" y="345">?</text>
        <text x="360" y="435">?</text>
      </g>
      
      <!-- Root label -->
      <g font-family="Inter" font-size="9" fill="#4a5568">
        <text x="10" y="215">Common</text>
        <text x="10" y="228">Ancestor</text>
      </g>
    </svg>
  </div>
</div>

<script>
// Species data with 8-position barcodes
const speciesData = [
  { 
    key: 'melanogaster', 
    short: 'D. mel.', 
    full: 'Drosophila melanogaster',
    bands: ['intact', 'useful', 'broken', 'useful', 'useful', 'broken', 'intact', 'empty']
  },
  { 
    key: 'simulans', 
    short: 'D. sim.', 
    full: 'Drosophila simulans',
    bands: ['intact', 'intact', 'broken', 'useful', 'unique', 'broken', 'intact', 'empty']
  },
  { 
    key: 'yakuba', 
    short: 'D. yak.', 
    full: 'Drosophila yakuba',
    bands: ['broken', 'useful', 'intact', 'broken', 'useful', 'broken', 'intact', 'empty']
  },
  { 
    key: 'pseudoobscura', 
    short: 'D. pse.', 
    full: 'Drosophila pseudoobscura',
    bands: ['useful', 'intact', 'intact', 'intact', 'useful', 'intact', 'intact', 'empty']
  },
  { 
    key: 'virilis', 
    short: 'D. vir.', 
    full: 'Drosophila virilis',
    bands: ['intact', 'broken', 'broken', 'broken', 'useful', 'broken', 'empty', 'empty']
  }
];

function bandClass(bandType) {
  if (bandType === 'intact') return 'intact';
  if (bandType === 'useful') return 'useful';
  if (bandType === 'broken') return 'broken';
  if (bandType === 'unique') return 'unique';
  return 'empty';
}

function barcodeHTML(bands) {
  return `
    <div class="barcode-container">
      <div class="barcode">
        ${bands.map(band => `<div class="band ${bandClass(band)}"></div>`).join('')}
      </div>
    </div>
  `;
}

function speciesCard(sp) {
  return `
    <div class="card">
      <div class="card-inner">
        <div class="card-title">🔍 Compare Barcodes</div>
        <div class="card-species">${sp.full}</div>
        ${barcodeHTML(sp.bands)}
        <div class="legend">
          <span class="chip"><span class="dot" style="background:#16a34a;"></span> Intact (green)</span>
          <span class="chip"><span class="dot" style="background:#ef4444;"></span> Useful (red)</span>
          <span class="chip"><span class="dot" style="background:#111827;"></span> Broken (grey)</span>
          <span class="chip"><span class="dot" style="background:#f59e0b;"></span> Unique (gold)</span>
        </div>
      </div>
    </div>
  `;
}

document.getElementById('species-cards').innerHTML = speciesData.map(sp => speciesCard(sp)).join('');
</script>

</body>
</html>
