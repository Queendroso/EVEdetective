<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Kids Detective Cards (Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { size: A4; margin: 10mm; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{
    font-family: Inter, system-ui, sans-serif;
    background: #f0f4f8;
    padding: 10mm;
  }

  .sheet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8mm;
    page-break-after: always;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 0 0 2px #e2e8f0 inset;
    position: relative;
    break-inside: avoid;
    overflow: hidden;
  }

  .card-inner {
    padding: 12px;
    text-align: center;
  }

  /* DNA strand background */
  .dna-strand {
    background: repeating-linear-gradient(
      90deg,
      #f1f5f9 0px,
      #f1f5f9 2px,
      #ffffff 2px,
      #ffffff 8px
    );
    border-radius: 12px;
    padding: 20px 10px;
    margin: 10px 0;
    position: relative;
    min-height: 120px;
  }

  /* EVE dots - colourful but tiny (need lens) */
  .eve-spot {
    display: inline-block;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    margin: 0 2px;
  }
  
  .eve-intact { background: #16a34a; }
  .eve-useful { background: #ef4444; }
  .eve-broken { background: #111827; }
  .eve-unique { background: #f59e0b; }

  /* I-Spy checklist */
  .checklist {
    background: #f8fafc;
    border-radius: 12px;
    padding: 8px;
    margin-top: 10px;
    font-size: 10px;
    text-align: left;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
  }

  .checklist-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Answer key on back */
  .answer-key {
    background: #f0fdf4;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
  }

  .badge {
    display: inline-block;
    background: #0e8a68;
    color: white;
    font-size: 10px;
    border-radius: 20px;
    padding: 4px 8px;
    margin-top: 8px;
  }

  .title {
    font-size: 14px;
    font-weight: 700;
    color: #0a1a2f;
  }

  .species {
    font-size: 12px;
    color: #334155;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="screen-note">
  🔬 DETECTIVE CARDS: Use a 5-10× hand lens to find the tiny coloured dots hidden in the DNA strand!<br>
  📝 Count how many of each colour you find, then flip to check your answers.
</div>

<section class="sheet" id="cards"></section>

<script>
const speciesCards = [
  { 
    name: 'D. melanogaster', 
    full: 'Drosophila melanogaster',
    region: 'piRNA cluster 3R‑TAS',
    eves: [
      { type: 'intact', x: 10, y: 20 }, { type: 'useful', x: 35, y: 45 },
      { type: 'broken', x: 60, y: 30 }, { type: 'unique', x: 85, y: 55 },
      { type: 'intact', x: 20, y: 70 }, { type: 'useful', x: 50, y: 80 },
      { type: 'broken', x: 75, y: 15 }, { type: 'unique', x: 45, y: 25 }
    ]
  },
  {
    name: 'D. simulans',
    full: 'Drosophila simulans', 
    region: 'piRNA cluster 2L‑TAS',
    eves: [
      { type: 'broken', x: 15, y: 35 }, { type: 'useful', x: 40, y: 20 },
      { type: 'intact', x: 65, y: 50 }, { type: 'intact', x: 30, y: 75 },
      { type: 'unique', x: 80, y: 40 }, { type: 'broken', x: 55, y: 65 },
      { type: 'useful', x: 25, y: 15 }, { type: 'intact', x: 70, y: 80 }
    ]
  },
  {
    name: 'D. yakuba',
    full: 'Drosophila yakuba',
    region: 'Heterochromatin island H3',
    eves: [
      { type: 'useful', x: 20, y: 30 }, { type: 'intact', x: 45, y: 60 },
      { type: 'broken', x: 70, y: 25 }, { type: 'intact', x: 35, y: 85 },
      { type: 'unique', x: 85, y: 65 }, { type: 'useful', x: 15, y: 55 },
      { type: 'broken', x: 60, y: 45 }, { type: 'intact', x: 50, y: 15 }
    ]
  },
  {
    name: 'D. virilis',
    full: 'Drosophila virilis',
    region: 'Subtelomeric 2R',
    eves: [
      { type: 'broken', x: 25, y: 40 }, { type: 'intact', x: 55, y: 25 },
      { type: 'useful', x: 80, y: 60 }, { type: 'unique', x: 40, y: 70 },
      { type: 'broken', x: 65, y: 35 }, { type: 'intact', x: 20, y: 80 },
      { type: 'useful', x: 75, y: 20 }, { type: 'unique', x: 45, y: 50 }
    ]
  },
  {
    name: 'D. pseudoobscura',
    full: 'Drosophila pseudoobscura',
    region: 'Subtelomeric repeat S1',
    eves: [
      { type: 'intact', x: 30, y: 25 }, { type: 'intact', x: 55, y: 55 },
      { type: 'useful', x: 80, y: 35 }, { type: 'broken', x: 25, y: 70 },
      { type: 'unique', x: 70, y: 75 }, { type: 'intact', x: 45, y: 40 },
      { type: 'useful', x: 15, y: 45 }, { type: 'broken', x: 60, y: 15 }
    ]
  }
];

function generateEveDots(eves) {
  let dots = '';
  eves.forEach(eve => {
    let colorClass = '';
    if (eve.type === 'intact') colorClass = 'eve-intact';
    else if (eve.type === 'useful') colorClass = 'eve-useful';
    else if (eve.type === 'broken') colorClass = 'eve-broken';
    else if (eve.type === 'unique') colorClass = 'eve-unique';
    
    dots += `<span class="eve-spot ${colorClass}" style="position: absolute; left: ${eve.x}%; top: ${eve.y}%;"></span>`;
  });
  return dots;
}

function countByType(eves) {
  const counts = { intact: 0, useful: 0, broken: 0, unique: 0 };
  eves.forEach(eve => counts[eve.type]++);
  return counts;
}

function frontCard(card, idx) {
  const counts = countByType(card.eves);
  return `
    <div class="card">
      <div class="card-inner">
        <div class="title">🔍 FIND THE EVEs</div>
        <div class="species">${card.name}</div>
        <div class="species" style="font-size: 8px;">${card.full}</div>
        
        <div class="dna-strand" style="position: relative;">
          ${generateEveDots(card.eves)}
        </div>
        
        <div class="checklist">
          <div class="checklist-item"><span class="checklist-dot" style="background: #16a34a;"></span> Intact (green): ___ found</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #ef4444;"></span> Useful (red): ___ found</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #111827;"></span> Broken (grey): ___ found</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #f59e0b;"></span> Unique (gold): ___ found</div>
        </div>
        
        <div class="badge">🔬 Use hand lens (5-10×)</div>
      </div>
    </div>
  `;
}

function backCard(card, idx) {
  const counts = countByType(card.eves);
  return `
    <div class="card">
      <div class="card-inner">
        <div class="title">📖 ANSWER KEY</div>
        <div class="species">${card.name}</div>
        
        <div class="answer-key">
          <strong>Found in this species:</strong><br>
          🟢 ${counts.intact} × Intact EVEs<br>
          🔴 ${counts.useful} × Useful EVEs<br>
          ⚫ ${counts.broken} × Broken EVEs<br>
          🟡 ${counts.unique} × Unique EVEs<br>
          <div style="margin-top: 8px; font-size: 9px;">Region: ${card.region}</div>
        </div>
        
        <div class="legend" style="margin-top: 8px; font-size: 8px;">
          <span class="chip"><span class="dot" style="background:#16a34a;"></span> Intact</span>
          <span class="chip"><span class="dot" style="background:#ef4444;"></span> Useful</span>
          <span class="chip"><span class="dot" style="background:#111827;"></span> Broken</span>
          <span class="chip"><span class="dot" style="background:#f59e0b;"></span> Unique</span>
        </div>
      </div>
    </div>
  `;
}

let frontsHtml = '';
let backsHtml = '';
speciesCards.forEach((card, idx) => {
  frontsHtml += frontCard(card, idx);
  backsHtml += backCard(card, idx);
});

document.getElementById('cards').innerHTML = frontsHtml + backsHtml;
</script>

</body>
</html>
