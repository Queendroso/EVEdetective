<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Kids Cards (Micro EVEs, Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { size: A4; margin: 10mm; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:#0a1a2f;margin:0;padding:10mm;background:#f6f7fb}
  .screen-note{background:#fff7ed;border:1px solid #fed7aa;padding:.6rem;border-radius:.5rem;margin:0 0 8px}
  .toolbar{display:flex;gap:.75rem;align-items:center;margin:0 0 8px;flex-wrap:wrap}
  .toolbar label{font-size:.95rem}
  .toolbar input[type="range"]{vertical-align:middle}

  .sheet{display:grid;grid-template-columns:repeat(3,1fr);gap:8mm;page-break-after:always}
  .sheet:last-of-type{page-break-after:auto}

  .card{width:63mm;height:88mm;border-radius:4mm;background:#fff;box-shadow:0 0 0 0.5pt #e5e7eb inset;position:relative;overflow:hidden;break-inside:avoid}
  .pad{position:absolute;inset:6mm}
  .hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:3mm}
  .title{font-size:12pt;font-weight:700}
  .species{font-size:10pt;color:#334155}
  .sub{font-size:9pt;color:#64748b}

  /* EVE colours - consistent across all games */
  :root{
    --eve-intact:#16a34a;
    --eve-broken:#111827;
    --eve-useful:#ef4444;
    --eve-unique:#f59e0b;
    --eve-size-mm: 0.4;
    --eve-back-mm: 1.4;
  }

  /* FRONT CARDS: Real EVEs are very faint - need hand lens! */
  .front-eve.real {
    opacity: 0.25 !important;
  }
  
  /* DUMMY EVEs: White/grey circles that are NOT real EVEs */
  .front-eve.dummy {
    opacity: 0.4 !important;
    fill: #cbd5e1 !important;
    stroke: #cbd5e1 !important;
  }

  /* BACK CARDS: EVEs are fully visible for answer key */
  .back-eve {
    opacity: 1 !important;
  }

  .legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:3mm}
  .chip{display:inline-flex;gap:4px;align-items:center;border:1px solid #e5e7eb;border-radius:999px;padding:2px 6px;font-size:8.5pt;background:#fff;color:#0f172a}
  .dot{width:9px;height:9px;border-radius:50%}

  .cutmarks{position:absolute;inset:0;pointer-events:none}
  .cutmarks svg{position:absolute;inset:-6mm;width:calc(100% + 12mm);height:calc(100% + 12mm)}
  .cutmarks line{stroke:#94a3b8;stroke-width:.2pt;opacity:.7}
</style>
</head>
<body>

<div class="screen-note">
  🔬 MICRO EVEs: <strong>Real EVEs</strong> are very faint (25% opacity) - need 5-10× hand lens!<br>
  ⚪ <strong>White/grey dots</strong> are DUMMY EVEs (not real) - helps train careful observation!<br>
  📖 Back cards show answer key. Adjust sizes below for your hand lens.
</div>
<div class="toolbar">
  <label>Front size (mm):
    <input id="frontSize" type="range" min="0.2" max="1.2" step="0.05" value="0.4"
           oninput="updateEveSize('front', this.value)">
    <span id="frontSizeVal">0.4</span> mm
  </label>
  <label>Back size (mm):
    <input id="backSize" type="range" min="0.8" max="2.5" step="0.05" value="1.4"
           oninput="updateEveSize('back', this.value)">
    <span id="backSizeVal">1.4</span> mm
  </label>
  <button onclick="window.print()">🖨️ Print</button>
</div>

<section class="sheet" id="fronts"></section>
<section class="sheet" id="backs"></section>

<script>
// EVE colours matching online game - ALL USE CIRCLES
const EVE_COLOURS = {
  intact: '#16a34a',   // green circle ●
  useful: '#ef4444',   // red circle ●
  broken: '#111827',   // grey/black circle ●
  unique: '#f59e0b'    // golden circle ●
};

// FIXED: EVE positions - all y coordinates between 0.15 and 0.75 to prevent cutting off
const speciesData = [
  { key:'melanogaster', short:'D. mel.', full:'Drosophila melanogaster',
    region:'piRNA cluster 3R‑TAS',
    intact:[[0.15,0.25],[0.55,0.18]], useful:[[0.38,0.48]], broken:[[0.20,0.68]], unique:[[0.75,0.45],[0.88,0.32]]
  },
  { key:'simulans', short:'D. sim.', full:'Drosophila simulans',
    region:'piRNA cluster 2L‑TAS',
    intact:[[0.25,0.22],[0.62,0.25]], useful:[[0.40,0.58]], broken:[[0.20,0.70]], unique:[[0.80,0.40]]
  },
  { key:'yakuba', short:'D. yak.', full:'Drosophila yakuba',
    region:'Heterochromatin island H3',
    intact:[[0.25,0.20]], useful:[[0.55,0.58]], broken:[[0.30,0.70]], unique:[[0.75,0.25]]
  },
  { key:'virilis', short:'D. vir.', full:'Drosophila virilis',
    region:'piRNA cluster 3L‑TAS',
    intact:[[0.22,0.30],[0.65,0.20]], useful:[[0.50,0.52]], broken:[[0.28,0.72]], unique:[[0.80,0.28]]
  },
  { key:'pseudoananassae', short:'D. pse.', full:'Drosophila pseudoananassae',
    region:'Subtelomeric repeat S1',
    intact:[[0.20,0.22],[0.48,0.20]], useful:[[0.68,0.58]], broken:[[0.30,0.70]], unique:[[0.72,0.22]]
  }
];

// Generate dummy EVE positions (white/grey circles that are NOT real EVEs)
function generateDummyEVEs(realPositions, count = 8) {
  const dummies = [];
  const taken = new Set(realPositions.map(p => `${p[0]},${p[1]}`));
  
  for (let i = 0; i < count; i++) {
    let x, y, attempts = 0;
    do {
      x = 0.08 + Math.random() * 0.84;  // Keep within 0.08 to 0.92
      y = 0.12 + Math.random() * 0.76;  // Keep within 0.12 to 0.88 (safe from edges)
      attempts++;
      if (attempts > 100) break;
    } while (taken.has(`${x},${y}`));
    dummies.push([x, y]);
    taken.add(`${x},${y}`);
  }
  return dummies;
}

function gridLines(W,H,step,stroke){
  const g=[]; 
  for(let x=0;x<=W;x+=step){ g.push(`<line x1="${x}" y1="0" x2="${x}" y2="${H}" stroke="${stroke}" stroke-width="0.15"/>`); }
  for(let y=0;y<=H;y+=step){ g.push(`<line x1="0" y1="${y}" x2="${W}" y2="${y}" stroke="${stroke}" stroke-width="0.15"/>`); }
  return g.join('');
}

function updateEveSize(type, value) {
  if (type === 'front') {
    document.documentElement.style.setProperty('--eve-size-mm', value);
    document.getElementById('frontSizeVal').textContent = value;
  } else {
    document.documentElement.style.setProperty('--eve-back-mm', value);
    document.getElementById('backSizeVal').textContent = value;
  }
  renderSheets();
}

function renderSheets() {
  document.getElementById('fronts').innerHTML = speciesData.map(svgFront).join('');
  document.getElementById('backs').innerHTML = speciesData.map(svgBack).join('');
}

function svgFront(data){
  const W=63, H=88, PAD=6;  // Increased padding from 4mm to 6mm for more margin
  const dmm = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--eve-size-mm')) || 0.4;
  const r = dmm/2; 
  const dots = [];
  
  // Collect real EVE positions
  const realPositions = [];
  
  function placeReal(list, colour, typeName){
    (list||[]).forEach(([nx,ny])=>{
      const x = PAD + nx*(W-2*PAD);
      const y = PAD + ny*(H-2*PAD);
      realPositions.push([nx, ny]);
      dots.push(`<circle class="front-eve real" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${colour}" opacity="0.25" stroke="rgba(0,0,0,0.15)" stroke-width="0.1"/>`);
    });
  }
  
  placeReal(data.intact, EVE_COLOURS.intact, 'intact');
  placeReal(data.useful, EVE_COLOURS.useful, 'useful');
  placeReal(data.broken, EVE_COLOURS.broken, 'broken');
  placeReal(data.unique, EVE_COLOURS.unique, 'unique');
  
  // Generate and add DUMMY EVEs (white/grey circles - not real)
  const dummies = generateDummyEVEs(realPositions, 10);
  dummies.forEach(([nx, ny]) => {
    const x = PAD + nx*(W-2*PAD);
    const y = PAD + ny*(H-2*PAD);
    dots.push(`<circle class="front-eve dummy" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="#cbd5e1" opacity="0.4" stroke="none"/>`);
  });
  
  return `
  <div class="card"><div class="pad">
    <div class="hdr"><div class="title">🔍 Find the EVEs</div><div class="species">${data.short}</div></div>
    <div class="sub">${data.full} — ${data.region}</div>
    <div class="sub" style="color:#d4a017; margin-bottom:2mm">✨ Use hand lens (5-10×) - colour = EVE type!</div>
    <svg width="63mm" height="88mm" viewBox="0 0 ${W} ${H}">
      ${gridLines(W,H,3,'#eef2f7')}
      ${dots.join('')}
    </svg>
  </div>
  <div class="cutmarks" aria-hidden="true"><svg>
    <line x1="6mm" y1="0" x2="6mm" y2="4mm" />
    <line x1="0" y1="6mm" x2="4mm" y2="6mm" />
    <line x1="calc(100% - 6mm)" y1="0" x2="calc(100% - 6mm)" y2="4mm" />
    <line x1="calc(100% - 0)" y1="6mm" x2="calc(100% - 4mm)" y2="6mm" />
    <line x1="6mm" y1="calc(100% - 0)" x2="6mm" y2="calc(100% - 4mm)" />
    <line x1="0" y1="calc(100% - 6mm)" x2="4mm" y2="calc(100% - 6mm)" />
    <line x1="calc(100% - 6mm)" y1="calc(100% - 0)" x2="calc(100% - 6mm)" y2="calc(100% - 4mm)" />
    <line x1="calc(100% - 0)" y1="calc(100% - 6mm)" x2="calc(100% - 4mm)" y2="calc(100% - 6mm)" />
  </svg></div></div>`;
}

function svgBack(data){
  const W=63, H=88, PAD=6;  // Increased padding
  const dmm = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--eve-back-mm')) || 1.4;
  const r = dmm/2; 
  const dots = [];
  
  // BACK: ALL REAL EVES use CIRCLES - fully visible
  function place(list, colour){
    (list||[]).forEach(([nx,ny])=>{
      const x = PAD + nx*(W-2*PAD);
      const y = PAD + ny*(H-2*PAD);
      dots.push(`<circle class="back-eve" cx="${x.toFixed(2)}" cy="${y.toFixed(2)}" r="${r}" fill="${colour}" stroke="rgba(0,0,0,0.2)" stroke-width="0.15"/>`);
    });
  }
  
  place(data.intact, EVE_COLOURS.intact);
  place(data.useful, EVE_COLOURS.useful);
  place(data.broken, EVE_COLOURS.broken);
  place(data.unique, EVE_COLOURS.unique);
  
  return `
  <div class="card"><div class="pad">
    <div class="hdr"><div class="title">📖 Answer Key</div><div class="species">${data.short}</div></div>
    <div class="sub">${data.full} — ${data.region}</div>
    <svg width="63mm" height="88mm" viewBox="0 0 ${W} ${H}">
      ${gridLines(W,H,3,'#e8edf3')}
      ${dots.join('')}
    </svg>
    <div class="legend">
      <span class="chip"><span class="dot" style="background:${EVE_COLOURS.intact}"></span> Intact (green)</span>
      <span class="chip"><span class="dot" style="background:${EVE_COLOURS.useful}"></span> Useful (red)</span>
      <span class="chip"><span class="dot" style="background:${EVE_COLOURS.broken}"></span> Broken (grey)</span>
      <span class="chip"><span class="dot" style="background:${EVE_COLOURS.unique}"></span> Unique (gold)</span>
    </div>
  </div>
  <div class="cutmarks" aria-hidden="true"><svg>
    <line x1="6mm" y1="0" x2="6mm" y2="4mm" />
    <line x1="0" y1="6mm" x2="4mm" y2="6mm" />
    <line x1="calc(100% - 6mm)" y1="0" x2="calc(100% - 6mm)" y2="4mm" />
    <line x1="calc(100% - 0)" y1="6mm" x2="calc(100% - 4mm)" y2="6mm" />
    <line x1="6mm" y1="calc(100% - 0)" x2="6mm" y2="calc(100% - 4mm)" />
    <line x1="0" y1="calc(100% - 6mm)" x2="4mm" y2="calc(100% - 6mm)" />
    <line x1="calc(100% - 6mm)" y1="calc(100% - 0)" x2="calc(100% - 6mm)" y2="calc(100% - 4mm)" />
    <line x1="calc(100% - 0)" y1="calc(100% - 6mm)" x2="calc(100% - 4mm)" y2="calc(100% - 6mm)" />
  </svg></div></div>`;
}

// Initial render
renderSheets();

// Slider value labels
const fs = document.getElementById('frontSize');
const bs = document.getElementById('backSize');
if(fs) fs.addEventListener('input', ()=> document.getElementById('frontSizeVal').textContent = fs.value);
if(bs) bs.addEventListener('input', ()=> document.getElementById('backSizeVal').textContent = bs.value);
</script>
</body>
</html>
