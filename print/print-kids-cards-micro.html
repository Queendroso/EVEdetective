<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>EVE Detective — Kids Detective Cards (Print)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  @page { size: A4; margin: 10mm; }
  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .screen-note, .toolbar { display:none !important }
  }

  body{
    font-family: Inter, system-ui, sans-serif;
    background: #f0f4f8;
    padding: 10mm;
  }

  .toolbar {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 16px;
    padding: 12px;
    background: white;
    border-radius: 60px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  
  .toolbar label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  
  .toolbar input {
    width: 200px;
  }
  
  .toolbar button {
    background: #0e8a68;
    color: white;
    border: none;
    padding: 6px 16px;
    border-radius: 40px;
    cursor: pointer;
  }

  .sheet {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8mm;
    page-break-after: always;
  }

  .card {
    background: white;
    border-radius: 16px;
    box-shadow: 0 0 0 2px #e2e8f0 inset;
    position: relative;
    break-inside: avoid;
    overflow: hidden;
  }

  .card-inner {
    padding: 12px;
    text-align: center;
  }

  /* DNA strand background */
  .dna-strand {
    background: repeating-linear-gradient(
      90deg,
      #f1f5f9 0px,
      #f1f5f9 2px,
      #ffffff 2px,
      #ffffff 8px
    );
    border-radius: 12px;
    padding: 20px 10px;
    margin: 10px 0;
    position: relative;
    min-height: 130px;
  }

  /* EVE dots - size controlled by CSS variable */
  .eve-spot {
    display: inline-block;
    width: var(--eve-dot-size, 5px);
    height: var(--eve-dot-size, 5px);
    border-radius: 50%;
    margin: 0;
    position: absolute;
    box-shadow: 0 0 0 0.5px rgba(0,0,0,0.1);
  }
  
  .eve-intact { background: #16a34a; }
  .eve-useful { background: #ef4444; }
  .eve-broken { background: #111827; }
  .eve-unique { background: #f59e0b; }

  /* I-Spy checklist */
  .checklist {
    background: #f8fafc;
    border-radius: 12px;
    padding: 8px;
    margin-top: 10px;
    font-size: 10px;
    text-align: left;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 4px 0;
  }

  .checklist-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  /* Answer key on back */
  .answer-key {
    background: #f0fdf4;
    border-radius: 12px;
    padding: 12px;
    margin-top: 10px;
    text-align: left;
  }

  .badge {
    display: inline-block;
    background: #0e8a68;
    color: white;
    font-size: 10px;
    border-radius: 20px;
    padding: 4px 8px;
    margin-top: 8px;
  }

  .title {
    font-size: 14px;
    font-weight: 700;
    color: #0a1a2f;
  }

  .species {
    font-size: 12px;
    color: #334155;
    font-style: italic;
  }
  
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    margin-top: 8px;
  }
  
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 8px;
    background: white;
    padding: 2px 6px;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
  }
  
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<div class="toolbar">
  <label>
    🔬 EVE Dot Size:
    <input type="range" id="dotSizeSlider" min="2" max="10" step="0.5" value="4">
    <span id="sizeValue">4</span> mm
  </label>
  <button onclick="window.print()">🖨️ Print Cards</button>
</div>

<div class="screen-note">
  🔬 DETECTIVE CARDS: Use a 5-10× hand lens to find the tiny coloured dots hidden in the DNA strand!<br>
  📝 Count how many of each colour you find, then flip to check your answers.<br>
  ⚡ Adjust the dot size above BEFORE printing - smaller dots (2-3mm) require a hand lens!
</div>

<section class="sheet" id="fronts"></section>
<section class="sheet" id="backs"></section>

<script>
// Size slider control
const slider = document.getElementById('dotSizeSlider');
const sizeValue = document.getElementById('sizeValue');
slider.addEventListener('input', function() {
  const size = this.value;
  sizeValue.textContent = size;
  document.documentElement.style.setProperty('--eve-dot-size', size + 'px');
});

// UNIQUE EVE PATTERNS FOR EACH SPECIES
// Each species has different distribution and counts
const speciesCards = [
  { 
    name: 'D. melanogaster', 
    full: 'Drosophila melanogaster',
    region: 'piRNA cluster 3R‑TAS',
    // 5 intact, 3 useful, 2 broken, 1 unique
    eves: [
      { type: 'intact', x: 12, y: 22 }, { type: 'intact', x: 28, y: 45 },
      { type: 'intact', x: 45, y: 18 }, { type: 'intact', x: 68, y: 58 },
      { type: 'intact', x: 85, y: 32 }, { type: 'useful', x: 18, y: 65 },
      { type: 'useful', x: 38, y: 82 }, { type: 'useful', x: 62, y: 28 },
      { type: 'broken', x: 52, y: 72 }, { type: 'broken', x: 78, y: 45 },
      { type: 'unique', x: 92, y: 75 }
    ]
  },
  { 
    name: 'D. simulans', 
    full: 'Drosophila simulans', 
    region: 'piRNA cluster 2L‑TAS',
    // 4 intact, 4 useful, 3 broken, 1 unique
    eves: [
      { type: 'intact', x: 15, y: 35 }, { type: 'intact', x: 32, y: 18 },
      { type: 'intact', x: 55, y: 42 }, { type: 'intact', x: 78, y: 25 },
      { type: 'useful', x: 22, y: 68 }, { type: 'useful', x: 42, y: 55 },
      { type: 'useful', x: 65, y: 78 }, { type: 'useful', x: 88, y: 48 },
      { type: 'broken', x: 38, y: 85 }, { type: 'broken', x: 72, y: 62 },
      { type: 'broken', x: 52, y: 15 }, { type: 'unique', x: 95, y: 88 }
    ]
  },
  { 
    name: 'D. yakuba', 
    full: 'Drosophila yakuba',
    region: 'Heterochromatin island H3',
    // 3 intact, 2 useful, 5 broken, 2 unique
    eves: [
      { type: 'intact', x: 20, y: 28 }, { type: 'intact', x: 48, y: 65 },
      { type: 'intact', x: 82, y: 38 }, { type: 'useful', x: 35, y: 45 },
      { type: 'useful', x: 62, y: 22 }, { type: 'broken', x: 15, y: 72 },
      { type: 'broken', x: 42, y: 88 }, { type: 'broken', x: 68, y: 55 },
      { type: 'broken', x: 88, y: 68 }, { type: 'broken', x: 55, y: 35 },
      { type: 'unique', x: 25, y: 15 }, { type: 'unique', x: 75, y: 82 }
    ]
  },
  { 
    name: 'D. virilis', 
    full: 'Drosophila virilis',
    region: 'Subtelomeric 2R',
    // 5 intact, 1 useful, 4 broken, 2 unique
    eves: [
      { type: 'intact', x: 18, y: 42 }, { type: 'intact', x: 35, y: 25 },
      { type: 'intact', x: 58, y: 72 }, { type: 'intact', x: 72, y: 38 },
      { type: 'intact', x: 88, y: 55 }, { type: 'useful', x: 45, y: 85 },
      { type: 'broken', x: 28, y: 68 }, { type: 'broken', x: 52, y: 18 },
      { type: 'broken', x: 68, y: 88 }, { type: 'broken', x: 82, y: 28 },
      { type: 'unique', x: 42, y: 55 }, { type: 'unique', x: 95, y: 75 }
    ]
  },
  { 
    name: 'D. pseudoobscura', 
    full: 'Drosophila pseudoobscura',
    region: 'Subtelomeric repeat S1',
    // 4 intact, 3 useful, 3 broken, 1 unique
    eves: [
      { type: 'intact', x: 22, y: 32 }, { type: 'intact', x: 38, y: 58 },
      { type: 'intact', x: 62, y: 25 }, { type: 'intact', x: 85, y: 48 },
      { type: 'useful', x: 28, y: 78 }, { type: 'useful', x: 48, y: 42 },
      { type: 'useful', x: 75, y: 68 }, { type: 'broken', x: 15, y: 55 },
      { type: 'broken', x: 55, y: 88 }, { type: 'broken', x: 92, y: 35 },
      { type: 'unique', x: 68, y: 15 }
    ]
  }
];

function generateEveDots(eves) {
  let dots = '';
  eves.forEach(eve => {
    let colorClass = '';
    if (eve.type === 'intact') colorClass = 'eve-intact';
    else if (eve.type === 'useful') colorClass = 'eve-useful';
    else if (eve.type === 'broken') colorClass = 'eve-broken';
    else if (eve.type === 'unique') colorClass = 'eve-unique';
    
    dots += `<span class="eve-spot ${colorClass}" style="left: ${eve.x}%; top: ${eve.y}%;"></span>`;
  });
  return dots;
}

function countByType(eves) {
  const counts = { intact: 0, useful: 0, broken: 0, unique: 0 };
  eves.forEach(eve => counts[eve.type]++);
  return counts;
}

function frontCard(card) {
  const counts = countByType(card.eves);
  return `
    <div class="card">
      <div class="card-inner">
        <div class="title">🔍 FIND THE EVEs</div>
        <div class="species">${card.name}</div>
        <div class="species" style="font-size: 8px;">${card.full}</div>
        
        <div class="dna-strand" style="position: relative;">
          ${generateEveDots(card.eves)}
        </div>
        
        <div class="checklist">
          <div class="checklist-item"><span class="checklist-dot" style="background: #16a34a;"></span> Intact (green): ___ found (total: ${counts.intact})</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #ef4444;"></span> Useful (red): ___ found (total: ${counts.useful})</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #111827;"></span> Broken (grey): ___ found (total: ${counts.broken})</div>
          <div class="checklist-item"><span class="checklist-dot" style="background: #f59e0b;"></span> Unique (gold): ___ found (total: ${counts.unique})</div>
        </div>
        
        <div class="badge">🔬 Use hand lens (5-10×)</div>
      </div>
    </div>
  `;
}

function backCard(card) {
  const counts = countByType(card.eves);
  return `
    <div class="card">
      <div class="card-inner">
        <div class="title">📖 ANSWER KEY</div>
        <div class="species">${card.name}</div>
        
        <div class="answer-key">
          <strong>🎯 Found in this species:</strong><br>
          🟢 <strong>${counts.intact}</strong> × Intact EVEs (green circles)<br>
          🔴 <strong>${counts.useful}</strong> × Useful EVEs (red circles)<br>
          ⚫ <strong>${counts.broken}</strong> × Broken EVEs (grey/black circles)<br>
          🟡 <strong>${counts.unique}</strong> × Unique EVEs (gold circles)<br>
          <div style="margin-top: 8px; font-size: 9px; color: #64748b;">📍 Genomic Region: ${card.region}</div>
        </div>
        
        <div class="legend">
          <span class="chip"><span class="dot" style="background:#16a34a;"></span> Intact</span>
          <span class="chip"><span class="dot" style="background:#ef4444;"></span> Useful</span>
          <span class="chip"><span class="dot" style="background:#111827;"></span> Broken</span>
          <span class="chip"><span class="dot" style="background:#f59e0b;"></span> Unique</span>
        </div>
      </div>
    </div>
  `;
}

let frontsHtml = '';
let backsHtml = '';
speciesCards.forEach(card => {
  frontsHtml += frontCard(card);
  backsHtml += backCard(card);
});

document.getElementById('fronts').innerHTML = frontsHtml;
document.getElementById('backs').innerHTML = backsHtml;
</script>

</body>
</html>
